# Modular RAG MCP Server - Configuration
# Auto-generated by setup skill. Edit as needed.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "openai"
  model: "gpt-4o"
  deployment_name: ""
  azure_endpoint: ""
  api_version: ""
  api_key: "${OPENAI_API_KEY}"
  base_url: "https://api.openai-proxy.org/v1"
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "openai"
  model: "text-embedding-3-small"
  dimensions: 1536
  azure_endpoint: ""
  deployment_name: ""
  api_version: ""
  api_key: "${OPENAI_API_KEY}"
  base_url: "https://api.openai-proxy.org/v1"

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true
  provider: "openai"
  model: "gpt-4o"
  azure_endpoint: ""
  deployment_name: ""
  api_version: ""
  api_key: "${OPENAI_API_KEY}"
  base_url: "https://api.openai-proxy.org/v1"
  max_image_size: 2048

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"

# =============================================================================
# Document Processing Configuration
# =============================================================================
document_processing:
  chunk_size: 1000
  chunk_overlap: 200
  supported_formats:
    - ".txt"
    - ".md"
    - ".pdf"
    - ".docx"
    - ".html"
  ocr_enabled: true
  image_captioning_enabled: true

# =============================================================================
# Query Engine Configuration
# =============================================================================
query_engine:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  enable_dense: true
  enable_sparse: true
  parallel_retrieval: true
  metadata_filter_post: true
  reranker_enabled: false

# =============================================================================
# Agent Configuration
# =============================================================================
agent:
  enabled: true
  max_iterations: 5
  enable_logging: true
  memory_max_turns: 10
  memory_max_tokens: 2000

# =============================================================================
# Server Configuration
# =============================================================================
server:
  host: "0.0.0.0"
  port: 3000
  debug: false
  log_level: "INFO"

# =============================================================================
# Security Configuration
# =============================================================================
security:
  secret_key: "${SECRET_KEY}"
  access_token_expire_minutes: 30
  allowed_hosts:
    - "localhost"
    - "127.0.0.1"
