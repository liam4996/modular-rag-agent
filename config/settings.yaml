# Modular RAG MCP Server - Configuration
# Auto-generated by setup skill. Edit as needed.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "openai"
  model: "gpt-4o"
  deployment_name: ""
  azure_endpoint: ""
  api_version: ""
  # 使用环境变量 OPENAI_API_KEY，或在此填写（勿提交到 Git）
  api_key: ""
  base_url: "https://api.openai.com/v1"
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "openai"
  model: "text-embedding-3-small"
  dimensions: 1536
  azure_endpoint: ""
  deployment_name: ""
  api_version: ""
  api_key: ""
  base_url: "https://api.openai.com/v1"

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true
  provider: "openai"
  model: "gpt-4o"
  azure_endpoint: ""
  deployment_name: ""
  api_version: ""
  api_key: ""
  base_url: "https://api.openai.com/v1"
  max_image_size: 2048

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "default"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

# =============================================================================
# Reranker Configuration
# =============================================================================
rerank:
  enabled: false
  provider: "none"
  model: "none"
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  provider: "none"
  metrics:
    - "faithfulness"
    - "relevancy"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/trace.json"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"
  batch_size: 50
  chunk_refiner:
    use_llm: false
  metadata_enricher:
    use_llm: false

# =============================================================================
# Web Search Configuration (Tavily recommended for China)
# Get free API key: https://app.tavily.com (1000 searches/month free)
# =============================================================================
web_search:
  engine: "tavily"
  # 使用环境变量 TAVILY_API_KEY，或在此填写（勿提交到 Git）
  tavily_api_key: ""
  # google_api_key: ""
  # google_search_engine_id: ""
  # bing_api_key: ""

# =============================================================================
# Agent Configuration
# =============================================================================
agent:
  enabled: true
  max_iterations: 5
  enable_logging: true
  memory_max_turns: 10
  memory_max_tokens: 2000

# =============================================================================
# Server Configuration
# =============================================================================
server:
  host: "0.0.0.0"
  port: 3000
  debug: false
  log_level: "INFO"

# =============================================================================
# Security Configuration
# =============================================================================
security:
  secret_key: "your-secret-key-change-this"
  access_token_expire_minutes: 30
  allowed_hosts:
    - "localhost"
    - "127.0.0.1"
